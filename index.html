<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Menu Bar -->
  <header class="menu-bar" id="menu-bar">
    <div class="menu-bar-left">

      <div class="menu-app-name" id="menu-app-name"><strong>Finder</strong></div>
      <div class="menu-items">
        <span class="menu-item">File</span>
        <span class="menu-item">Edit</span>
        <span class="menu-item">View</span>
        <span class="menu-item">Go</span>
        <span class="menu-item">Window</span>
        <span class="menu-item">Help</span>
      </div>
    </div>
    <div class="menu-bar-right">
      <div class="system-tray">
        <i data-lucide="wifi" class="tray-icon"></i>
        <i data-lucide="battery-full" class="tray-icon"></i>
        <i data-lucide="search" class="tray-icon"></i>
        <i data-lucide="control" class="tray-icon"></i>
      </div>
      <div class="menu-clock" id="menu-clock"></div>
    </div>
  </header>

  <!-- Desktop Area -->
  <main class="desktop" id="desktop">

    <!-- Desktop Icons -->
    <div class="desktop-icons">
      <div class="desktop-icon" data-app="finder">
        <div class="desktop-icon-img finder-icon">
          <svg width="48" height="48" viewBox="0 0 48 48"><rect x="4" y="8" width="40" height="34" rx="4" fill="#47A3FF"/><rect x="4" y="8" width="40" height="10" rx="4" fill="#1E6FD9"/><circle cx="14" cy="13" r="2" fill="#FF5F57"/><circle cx="20" cy="13" r="2" fill="#FEBC2E"/><circle cx="26" cy="13" r="2" fill="#28C840"/><rect x="8" y="22" width="14" height="3" rx="1" fill="rgba(255,255,255,0.5)"/><rect x="8" y="28" width="10" height="3" rx="1" fill="rgba(255,255,255,0.5)"/><rect x="8" y="34" width="12" height="3" rx="1" fill="rgba(255,255,255,0.5)"/></svg>
        </div>
        <span>Finder</span>
      </div>
      <div class="desktop-icon" data-app="threads">
        <div class="desktop-icon-img threads-desktop-icon">
          <svg width="48" height="48" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#6C5CE7"/><rect x="10" y="12" width="28" height="4" rx="2" fill="rgba(255,255,255,0.7)"/><rect x="10" y="20" width="20" height="4" rx="2" fill="rgba(255,255,255,0.5)"/><rect x="10" y="28" width="24" height="4" rx="2" fill="rgba(255,255,255,0.5)"/><rect x="10" y="36" width="16" height="4" rx="2" fill="rgba(255,255,255,0.3)"/></svg>
        </div>
        <span>Threads</span>
      </div>
    </div>

    <!-- Windows Container -->
    <div class="windows-container" id="windows-container">

      <!-- Finder Window -->
      <div class="mac-window" id="finder-window" style="width:820px; height:520px; top:60px; left:120px;">
        <div class="window-titlebar" data-window="finder-window">
          <div class="traffic-lights">
            <button class="tl-btn tl-close" data-action="close"></button>
            <button class="tl-btn tl-minimize" data-action="minimize"></button>
            <button class="tl-btn tl-maximize" data-action="maximize"></button>
          </div>
          <div class="window-title">Finder</div>
          <div class="window-titlebar-spacer"></div>
          <div class="titlebar-actions">
            <button class="tb-action-btn" id="btn-back-nav"><i data-lucide="chevron-left"></i></button>
            <button class="tb-action-btn" id="btn-forward-nav"><i data-lucide="chevron-right"></i></button>
          </div>
        </div>
        <div class="window-body finder-body">
          <aside class="finder-sidebar">
            <div class="sidebar-section">
              <div class="sidebar-label">Favorites</div>
              <div class="sidebar-item active" data-section="all-threads">
                <i data-lucide="layers"></i><span>All Threads</span>
              </div>
              <div class="sidebar-item" data-section="desktop-node">
                <i data-lucide="monitor"></i><span>DESK-01</span>
              </div>
              <div class="sidebar-item" data-section="mobile-node">
                <i data-lucide="smartphone"></i><span>MOBILE-01</span>
              </div>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-label">Shared</div>
              <div class="sidebar-item" data-section="fused">
                <i data-lucide="link"></i><span>Fused Threads</span>
              </div>
              <div class="sidebar-item" data-section="recent">
                <i data-lucide="clock"></i><span>Recent</span>
              </div>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-label">Tags</div>
              <div class="sidebar-item"><span class="tag-dot red"></span><span>Critical</span></div>
              <div class="sidebar-item"><span class="tag-dot blue"></span><span>Development</span></div>
              <div class="sidebar-item"><span class="tag-dot purple"></span><span>Shared</span></div>
            </div>
          </aside>
          <div class="finder-content">
            <div class="finder-toolbar">
              <div class="finder-view-toggle">
                <button class="view-btn active" data-view="list"><i data-lucide="list"></i></button>
                <button class="view-btn" data-view="grid"><i data-lucide="grid-3x3"></i></button>
              </div>
              <div class="finder-search">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search threads..." id="finder-search-input">
              </div>
            </div>
            <div class="finder-list-header">
              <span class="col-name">Name</span>
              <span class="col-status">Status</span>
              <span class="col-node">Node</span>
              <span class="col-pid">PID</span>
            </div>
            <div class="finder-list" id="finder-list">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
        <div class="window-resize-handle" data-window="finder-window"></div>
      </div>

      <!-- Thread Detail Window -->
      <div class="mac-window thread-detail-window" id="thread-detail-window" style="width:540px; height:440px; top:120px; left:400px; display:none;">
        <div class="window-titlebar" data-window="thread-detail-window">
          <div class="traffic-lights">
            <button class="tl-btn tl-close" data-action="close"></button>
            <button class="tl-btn tl-minimize" data-action="minimize"></button>
            <button class="tl-btn tl-maximize" data-action="maximize"></button>
          </div>
          <div class="window-title" id="detail-window-title">Thread Details</div>
          <div class="window-titlebar-spacer"></div>
        </div>
        <div class="window-body detail-body">
          <div class="detail-header">
            <div class="detail-icon" id="detail-icon"></div>
            <div class="detail-info">
              <h3 id="detail-thread-name"></h3>
              <div class="detail-meta">
                <span class="detail-badge" id="detail-badge"></span>
                <span class="detail-pid" id="detail-pid"></span>
              </div>
            </div>
          </div>
          <div class="detail-sections">
            <div class="detail-tabs">
              <button class="detail-tab active" data-tab="code">Code</button>
              <button class="detail-tab" data-tab="state">State</button>
              <button class="detail-tab" data-tab="memory">Memory</button>
            </div>
            <div class="detail-content" id="detail-content">
              <pre id="detail-code-pre"></pre>
            </div>
            <div class="detail-actions">
              <button class="detail-action-btn" id="detail-toggle-btn">
                <i data-lucide="arrow-right-left"></i> Switch Node
              </button>
              <button class="detail-action-btn secondary" id="detail-close-btn">Close</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Dock -->
  <footer class="dock-wrapper" id="dock-wrapper">
    <div class="dock" id="dock">
      <div class="dock-item" data-app="finder" data-tooltip="Finder">
        <div class="dock-item-img">
          <svg width="32" height="32" viewBox="0 0 48 48"><rect x="4" y="8" width="40" height="34" rx="4" fill="#47A3FF"/><rect x="4" y="8" width="40" height="10" rx="4" fill="#1E6FD9"/><circle cx="14" cy="13" r="2" fill="#FF5F57"/><circle cx="20" cy="13" r="2" fill="#FEBC2E"/><circle cx="26" cy="13" r="2" fill="#28C840"/></svg>
        </div>
        <div class="dock-indicator"></div>
      </div>
      <div class="dock-item" data-app="threads" data-tooltip="Threads">
        <div class="dock-item-img">
          <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#6C5CE7"/><rect x="10" y="12" width="28" height="4" rx="2" fill="rgba(255,255,255,0.7)"/><rect x="10" y="20" width="20" height="4" rx="2" fill="rgba(255,255,255,0.5)"/><rect x="10" y="28" width="24" height="4" rx="2" fill="rgba(255,255,255,0.5)"/></svg>
        </div>
        <div class="dock-indicator active"></div>
      </div>
      <div class="dock-separator"></div>
      <div class="dock-item" data-app="terminal" data-tooltip="Terminal">
        <div class="dock-item-img">
          <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#1C1C1E"/><text x="10" y="30" font-family="monospace" font-size="18" fill="#28C840">&gt;_</text></svg>
        </div>
      </div>
      <div class="dock-item" data-app="activity" data-tooltip="Activity Monitor">
        <div class="dock-item-img">
          <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#1C1C1E"/><polyline points="8,32 16,20 24,28 32,14 40,22" fill="none" stroke="#28C840" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="dock-spacer"></div>
      <div class="dock-item dock-trash" data-app="trash" data-tooltip="Trash">
        <div class="dock-item-img">
          <svg width="32" height="32" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="transparent"/><path d="M14 16h20l-2 24H16L14 16z" fill="none" stroke="#999" stroke-width="2"/><path d="M20 12h8v4H20z" fill="none" stroke="#999" stroke-width="2"/><line x1="20" y1="22" x2="20" y2="34" stroke="#999" stroke-width="1.5"/><line x1="24" y1="22" x2="24" y2="34" stroke="#999" stroke-width="1.5"/><line x1="28" y1="22" x2="28" y2="34" stroke="#999" stroke-width="1.5"/></svg>
        </div>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
